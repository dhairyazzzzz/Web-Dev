<!DOCTYPE html>
<html lang="en">
<head>

    <title>MY Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div id="calculator">
        <input type="text" id="display" readonly>
        <div class="button_container">
            <button class="button"  onclick="result='';
            document.querySelector('#display').value=result;">
            c
            </button>
            <button class="button"  onclick="result=result + '1';
            document.querySelector('#display').value=result;">1</button>
            <button class="button"  onclick="result=result + '2';
            document.querySelector('#display').value=result;">2</button>
            <button class="button" onclick="result=result + '+';
            document.querySelector('#display').value=result;">+</button>
            <button class="button"  onclick="result=result + '3';
            document.querySelector('#display').value=result;">3</button>
            <button class="button"  onclick="result=result + '4';
            document.querySelector('#display').value=result;">4</button>
            <button class="button" onclick="result=result + '-';
            document.querySelector('#display').value=result;">-</button>
            <button class="button"  onclick="result=result + '5';
            document.querySelector('#display').value=result;">5</button>
            <button class="button"  onclick="result=result + '6';
            document.querySelector('#display').value=result;">6</button>
            <button class="button" onclick="result=result + '*';
            document.querySelector('#display').value=result;">*</button>
            <button class="button" onclick="result=result + '7';
            document.querySelector('#display').value=result;">7</button>
            <button class="button" onclick="result=result + '8';
            document.querySelector('#display').value=result;">8</button>
            <button class="button" onclick="result=result + '/';
            document.querySelector('#display').value=result;">/</button>
            <button class="button" onclick="let resultt = eval(result);
            result = resultt;
            document.querySelector('#display').value=result;">=</button>
            <button class="button" onclick="result=result + '9';
            document.querySelector('#display').value=result;">9</button>
            <button class="button" onclick="result=result + '0';
            document.querySelector('#display').value=result;">0</button>
            <button class="button" onclick="result=result + '.';
            document.querySelector('#display').value=result;">.</button>
            

        </div>
     
    </div>
    <script>
        let result ='';
        document.querySelector('#display').value=result;
    </script>
</body>
</html>
